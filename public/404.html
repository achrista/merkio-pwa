<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Merkio</title>
  <script>
    // SPA fallback: redirect to index with hash-encoded path
    var path = window.location.pathname;
    var search = window.location.search;
    var hash = window.location.hash;
    sessionStorage.setItem('spa_redirect', path + search + hash);
    window.location.replace('/?redirect=1');
  </script>
</head>
<body></body>
</html>
