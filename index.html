<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0050AA" />
    <meta name="description" content="Merkio – Einkaufslisten, To-dos & Notizen" />
    <title>Merkio</title>
    <script>
      // Dark Mode FOUC-frei setzen, bevor React lädt
      (function () {
        try {
          var p = localStorage.getItem('theme');
          var dark = p === 'dark' || ((!p || p === 'system') && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) {
            document.documentElement.classList.add('dark');
            var m = document.querySelector('meta[name="theme-color"]');
            if (m) m.setAttribute('content', '#0e1620');
          }
        } catch (e) {}
      })();
    </script>
    <script>
      // Restore SPA redirect after GitHub Pages 404 fallback
      var redirect = sessionStorage.getItem('spa_redirect');
      if (redirect && window.location.search === '?redirect=1') {
        sessionStorage.removeItem('spa_redirect');
        window.history.replaceState(null, '', redirect);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
